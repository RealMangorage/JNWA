plugins {
    id 'java'
    id 'application'
}

group = 'org.mangorage'
version = '0.0.1-beta'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.commons:commons-vfs2:2.10.0'
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ["--add-modules", "jdk.incubator.vector", "--enable-preview"]
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += [
            "--enable-native-access=ALL-UNNAMED",
            "--add-modules=jdk.incubator.vector",
            "--enable-preview"
    ]
}

jar {
    manifest {
        attributes(
                "Main-Class": "org.mangorage.test.Test"
        )
    }
}

application {
    mainClass = 'org.mangorage.gamehub.GameHub'
}